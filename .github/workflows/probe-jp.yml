name: probe-jp

# TEMPORARY field-discovery probe for Phase 2 (2a). Runs on push to the
# feat/phase2-jp-fetch branch so it executes with the repo secrets without the
# "new workflow needs to be on the default branch before dispatch works" trap.
# Deleted once fetch-jp-equity.ts is built from the confirmed fields.

on:
  push:
    branches: [feat/phase2-jp-fetch]

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Probe J-Quants + ラジ株ナビ (Toyota 7203)
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          RADIKABUNAVI_API_KEY: ${{ secrets.RADIKABUNAVI_API_KEY }}
        run: npm run probe:jp
