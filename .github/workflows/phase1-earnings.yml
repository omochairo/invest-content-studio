name: phase1-earnings

# Phase 1 end-to-end in CI (execution host = GitHub Actions, see SPEC/AGENTS).
# fetch (FMP) -> generate (Gemini Flash) -> validate+compliance gate ->
# VOICEVOX TTS (docker service) -> Remotion render -> mp4 artifact.
# VOICEVOX runs as a service container so CI is self-contained (the NAS engine
# is unreachable from cloud runners). Dispatch-only for now; 1f adds a schedule.
# (workflow_dispatch needs this file on the default branch — merge before using.)

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: "Ticker symbol to render (must be on the watchlist coverage)"
        default: "NVDA"
        required: true

concurrency:
  group: phase1-earnings-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  earnings-video:
    runs-on: ubuntu-22.04
    env:
      SYMBOL: ${{ github.event.inputs.symbol || 'NVDA' }}
    services:
      voicevox:
        # Pin to the same engine version as the NAS (0.25.2) so the speaker-id
        # mapping matches (speaker 2 = 四国めたん ノーマル). No `cpu-latest` tag exists.
        image: voicevox/voicevox_engine:cpu-0.25.2
        ports:
          - 50021:50021
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Chromium runtime deps (Remotion)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libdbus-1-3 libatk1.0-0 libgbm1 libasound2 \
            libxrandr2 libxkbcommon0 libxfixes3 libxcomposite1 libxdamage1 \
            libatk-bridge2.0-0 libcups2 libpango-1.0-0 libcairo2

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: 1a Fetch earnings (FMP)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: npm run fetch -- "$SYMBOL"

      - name: 1b Generate ContentPackage (Gemini Flash)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run generate -- "$SYMBOL"

      - name: 1c Quality + compliance gate
        run: npm run check -- "outputs/content/$SYMBOL.json"

      - name: Wait for VOICEVOX engine
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:50021/version; then
              echo "VOICEVOX ready"; exit 0
            fi
            echo "waiting for VOICEVOX... ($i)"; sleep 5
          done
          echo "VOICEVOX did not become ready"; exit 1

      - name: 1d TTS (VOICEVOX)
        env:
          VOICEVOX_URL: http://localhost:50021
        run: npm run tts -- "outputs/content/$SYMBOL.json"

      - name: 1d Render mp4 (Remotion)
        working-directory: packages/video-generator
        run: |
          npx remotion render src/index.ts MarketRecap "out/$SYMBOL.mp4" \
            --props="$GITHUB_WORKSPACE/outputs/content/$SYMBOL.json"

      - name: Upload mp4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: earnings-${{ env.SYMBOL }}-mp4
          path: |
            packages/video-generator/out/${{ env.SYMBOL }}.mp4
            outputs/earnings/${{ env.SYMBOL }}.json
            outputs/content/${{ env.SYMBOL }}.json
          if-no-files-found: error
