name: phase2-jp

# Phase 2 JP-equity long-form pipeline, proven end-to-end in CI (the only
# execution host, see SPEC/AGENTS):
#   2a fetch  — J-Quants v2 + ラジ株ナビ MCP -> CompanyProfile (LLM-free numbers)
#   2c script — CompanyProfile -> long-form ContentPackage via Gemini (prose only)
#   gate      — validate (schema) + compliance (§2: zero prohibited phrases)
#   2e TTS+render — VOICEVOX (docker service) -> Remotion LongFormExplainer mp4
#
# Parallelism: the heavy per-code pipeline runs as a `strategy.matrix` over the
# requested TSE codes, so N codes render concurrently on N runners (public repo
# = free unlimited Actions minutes, ~20 concurrent jobs). The `setup` job parses
# the space-separated `codes` input into a JSON array the matrix fans out over.
# This keeps the execution host on GitHub Actions (no Jules quota, mp4 stays an
# artifact). Runs on push to the feature branch (proving) and on demand
# (workflow_dispatch needs this file on the default branch first). Each matrix
# shard runs the full per-code pipeline; the TTS+render stage (long-form is
# costly) can be skipped with the `render: false` dispatch input.

on:
  push:
    branches:
      - feat/phase2-jp-fetch
      - feat/phase2-jp-script-gen
      - feat/phase2-jp-tts-render
      - feat/phase2-jp-render-matrix
  workflow_dispatch:
    inputs:
      codes:
        description: "TSE codes (space-separated), e.g. 7203 6758 9984"
        default: "7203"
        required: true
      render:
        description: "Run the heavy TTS+render stage"
        type: boolean
        default: true
      gen_source:
        description: "Script source: gemini (generate:jp) or jules (harvest committed prose)"
        type: choice
        options: [gemini, jules]
        default: gemini

permissions:
  contents: read

jobs:
  # Parse the space-separated `codes` input into a JSON array the render matrix
  # fans out over, e.g. "7203 6758" -> ["7203","6758"]. jq is preinstalled on
  # ubuntu runners.
  setup:
    runs-on: ubuntu-22.04
    outputs:
      codes: ${{ steps.parse.outputs.codes }}
    steps:
      - id: parse
        run: |
          raw='${{ github.event.inputs.codes || '7203' }}'
          json=$(printf '%s' "$raw" | tr ' ' '\n' | grep -v '^$' | jq -R . | jq -s -c .)
          echo "codes=$json"
          echo "codes=$json" >> "$GITHUB_OUTPUT"

  jp-render:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        code: ${{ fromJson(needs.setup.outputs.codes) }}
    runs-on: ubuntu-22.04
    services:
      voicevox:
        # Same engine version as the NAS (0.25.2) so speaker 2 (四国めたん ノーマル)
        # matches. No `cpu-latest` tag exists. Used by the 2e TTS step below.
        image: voicevox/voicevox_engine:cpu-0.25.2
        ports:
          - 50021:50021
    env:
      CODE: ${{ matrix.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Chromium runtime deps (Remotion render)
        if: ${{ github.event.inputs.render != 'false' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libdbus-1-3 libatk1.0-0 libgbm1 libasound2 \
            libxrandr2 libxkbcommon0 libxfixes3 libxcomposite1 libxdamage1 \
            libatk-bridge2.0-0 libcups2 libpango-1.0-0 libcairo2
      - name: 2a Fetch CompanyProfile (J-Quants + ラジ株ナビ + edinetdb peer)
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          RADIKABUNAVI_API_KEY: ${{ secrets.RADIKABUNAVI_API_KEY }}
          EDINETDB_API_KEY: ${{ secrets.EDINETDB_API_KEY }}
        run: npm run fetch:jp -- "$CODE"
      - name: Show profile
        run: cat "outputs/equities/$CODE.json"
      - uses: actions/upload-artifact@v4
        with:
          name: jp-company-profile-${{ matrix.code }}
          path: outputs/equities/${{ matrix.code }}.json
          if-no-files-found: error
      - name: 2c Generate long-form ContentPackage (Gemini, numbers code-fixed)
        if: ${{ github.event.inputs.gen_source != 'jules' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
        run: npm run generate:jp -- "$CODE"
      - name: 2c Harvest Jules deep-dive prose (numbers still code-fixed)
        if: ${{ github.event.inputs.gen_source == 'jules' }}
        # Reads the committed jules-research/$CODE.prose.json (from a merged Jules
        # PR) and assembles it with the same code-derived assets + §2 gate. No
        # Gemini. Requires the Jules PR to be merged into the checked-out ref.
        run: npm run harvest:jules:jp -- "$CODE"
      - name: Gate (validate + §2 compliance) — fail stops publish
        run: npm run check -- "outputs/content/$CODE.json"
      - name: Show ContentPackage
        run: cat "outputs/content/$CODE.json"
      - uses: actions/upload-artifact@v4
        with:
          name: jp-content-package-${{ matrix.code }}
          path: outputs/content/${{ matrix.code }}.json
          if-no-files-found: error

      # ── 2e TTS + render (one code per matrix shard; long-form is costly) ─────
      - name: Wait for VOICEVOX engine
        if: ${{ github.event.inputs.render != 'false' }}
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:50021/version; then
              echo "VOICEVOX ready"; exit 0
            fi
            echo "waiting for VOICEVOX... ($i)"; sleep 5
          done
          echo "VOICEVOX did not become ready"; exit 1
      - name: 2e TTS (VOICEVOX, speaker 2)
        if: ${{ github.event.inputs.render != 'false' }}
        env:
          VOICEVOX_URL: http://localhost:50021
        run: npm run tts -- "outputs/content/$CODE.json"
      - name: 2e Render long-form mp4 (Remotion LongFormExplainer, 1920x1080)
        if: ${{ github.event.inputs.render != 'false' }}
        working-directory: packages/video-generator
        run: |
          # Wrap the bare ContentPackage into { pkg, manifest } — passing it raw
          # silently renders the sample (see scripts/render-props.mjs).
          node scripts/render-props.mjs \
            "$GITHUB_WORKSPACE/outputs/content/$CODE.json" out/render-props.json
          npx remotion render src/index.ts LongFormExplainer "out/$CODE.mp4" \
            --props=out/render-props.json
      - name: 2e Render thumbnail (Remotion still, 1280x720)
        if: ${{ github.event.inputs.render != 'false' }}
        working-directory: packages/video-generator
        run: |
          npx remotion still src/index.ts Thumbnail "out/$CODE.thumb.png" \
            --props=out/render-props.json
      - name: Report rendered duration / size
        if: ${{ github.event.inputs.render != 'false' }}
        run: |
          f="packages/video-generator/out/$CODE.mp4"
          ls -lh "$f"
          # Derive length from the audio manifest (no ffprobe dependency on the
          # runner): the video is exactly the sum of clip durations + padding.
          python3 - "packages/video-generator/public/audio/manifest.json" <<'PY'
          import json, sys, math
          PAD_MS, FPS = 350, 30
          m = json.load(open(sys.argv[1], encoding="utf-8"))
          clips = m["clips"]
          frames = sum(max(1, math.ceil(((c["durationMs"] + PAD_MS) / 1000) * FPS)) for c in clips)
          print(f"clips={len(clips)} frames={frames} duration={frames/FPS:.1f}s "
                f"(audio {sum(c['durationMs'] for c in clips)/1000:.1f}s + {PAD_MS}ms/scene pad)")
          PY
      - name: Upload long-form mp4 artifact
        if: ${{ github.event.inputs.render != 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: jp-longform-${{ matrix.code }}-mp4
          path: |
            packages/video-generator/out/${{ matrix.code }}.mp4
            outputs/content/${{ matrix.code }}.json
            packages/video-generator/public/audio/manifest.json
          if-no-files-found: error
      - name: Upload thumbnail artifact
        if: ${{ github.event.inputs.render != 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: jp-thumbnail-${{ matrix.code }}
          path: packages/video-generator/out/${{ matrix.code }}.thumb.png
          if-no-files-found: error
